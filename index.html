<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Faridabad Area Bhati March 2026 — Sewadar Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#0f1117;--card:#1a1d27;--card2:#22263a;--border:#2e3250;
    --accent:#6c63ff;--accent2:#00d4aa;--warn:#ff9f43;--danger:#ff6b6b;
    --success:#26de81;--text:#e8eaf6;--muted:#8892b0;--yellow:#ffd32a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;}
  .top-header{background:linear-gradient(135deg,#1a1d27,#22263a);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  .top-header h1{font-size:1rem;font-weight:700;color:#fff;}
  .last-updated{font-size:.72rem;color:var(--accent2);}
  .war-room{background:#13162a;border-bottom:2px solid var(--accent);padding:8px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .war-room .label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-right:4px;}
  .wr-pill{padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .wr-pill.green{background:rgba(38,222,129,.15);border:1px solid var(--success);color:var(--success);}
  .wr-pill.blue{background:rgba(108,99,255,.15);border:1px solid var(--accent);color:var(--accent);}
  .wr-pill.orange{background:rgba(255,159,67,.15);border:1px solid var(--warn);color:var(--warn);}
  .wr-pill.red{background:rgba(255,107,107,.15);border:1px solid var(--danger);color:var(--danger);}
  .wr-pill.yellow{background:rgba(255,211,42,.15);border:1px solid var(--yellow);color:var(--yellow);}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 1.5s infinite;flex-shrink:0;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px;gap:2px;}
  .tab{padding:10px 14px;cursor:pointer;font-size:.8rem;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab .tbadge{background:var(--danger);color:#fff;border-radius:10px;padding:1px 6px;font-size:.65rem;margin-left:4px;}
  .page{display:none;padding:16px;max-width:1600px;margin:0 auto;}
  .page.active{display:block;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  @media(max-width:900px){.grid4{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.grid2,.grid4{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;}
  .card-title{font-size:.75rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .card-title .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .kpi{text-align:center;}
  .kpi .val{font-size:2rem;font-weight:800;}
  .kpi .lbl{font-size:.72rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
  .kpi .sub{font-size:.7rem;color:var(--muted);margin-top:4px;}
  .kpi.green .val{color:var(--success);}
  .kpi.orange .val{color:var(--warn);}
  .kpi.red .val{color:var(--danger);}
  .kpi.blue .val{color:var(--accent);}
  .kpi.yellow .val{color:var(--yellow);}
  .tbl-wrap{overflow-x:auto;max-height:450px;overflow-y:auto;}
  table{width:100%;border-collapse:collapse;font-size:.78rem;}
  th{position:sticky;top:0;background:var(--card2);color:var(--muted);font-weight:700;padding:8px 10px;text-align:left;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);z-index:2;}
  td{padding:7px 10px;border-bottom:1px solid rgba(46,50,80,.5);vertical-align:middle;}
  tr:hover td{background:rgba(108,99,255,.06);}
  .flag-row td{background:rgba(255,107,107,.06)!important;}
  .warn-row td{background:rgba(255,159,67,.06)!important;}
  .btag{padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:700;display:inline-block;white-space:nowrap;}
  .btag.in{background:rgba(38,222,129,.2);color:var(--success);}
  .btag.out{background:rgba(255,107,107,.2);color:var(--danger);}
  .btag.present{background:rgba(38,222,129,.2);color:var(--success);}
  .btag.absent{background:rgba(255,107,107,.2);color:var(--danger);}
  .btag.unknown{background:rgba(255,211,42,.2);color:var(--yellow);}
  .btag.reentry{background:rgba(255,159,67,.2);color:var(--warn);}
  .btag.dup{background:rgba(255,107,107,.2);color:var(--danger);}
  .btag.noout{background:rgba(255,159,67,.2);color:var(--warn);}
  .prog-bar{background:rgba(255,255,255,.08);border-radius:4px;height:7px;overflow:hidden;margin-top:4px;}
  .prog-fill{height:100%;border-radius:4px;transition:width .5s;}
  .filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .filters select,.filters input{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:.78rem;}
  .btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:700;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-green{background:var(--success);color:#000;}
  .btn:hover{opacity:.85;}
  .chart-box{position:relative;height:220px;}
  .scanner-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
  .sc-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;}
  .sc-card.active-scanner{border-color:var(--success);}
  .sc-card.inactive-scanner{border-color:var(--danger);opacity:.7;}
  .sc-name{font-weight:700;font-size:.85rem;margin-bottom:4px;}
  .sc-meta{font-size:.7rem;color:var(--muted);margin:2px 0;}
  .sc-count{font-size:1.5rem;font-weight:800;color:var(--accent2);}
  .dept-group-header{background:var(--card2);font-weight:700;color:var(--accent);font-size:.75rem;padding:6px 10px;text-transform:uppercase;letter-spacing:.5px;}
  .search-box{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:.78rem;min-width:180px;}
  .loading{text-align:center;padding:40px;color:var(--muted);}
  .spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .check-box-print{width:14px;height:14px;border:1px solid #666;display:inline-block;}
  .print-show{display:none;}
  @media print{
    .tabs,.war-room,.top-header,.filters,.btn,.no-print{display:none!important;}
    .page{display:block!important;padding:0;}
    .card{border:1px solid #ccc;page-break-inside:avoid;margin-bottom:8px;}
    body{background:#fff!important;color:#000!important;}
    td,th{color:#000!important;background:#fff!important;border-color:#ccc!important;}
    .dept-group-header{background:#eee!important;color:#000!important;}
    .btag{border:1px solid #999!important;background:none!important;color:#000!important;}
    .tbl-wrap{max-height:none!important;overflow:visible!important;}
    .print-show{display:block!important;}
  }
</style>
</head>
<body>

<div class="top-header">
  <div>
    <div style="font-size:.68rem;color:var(--accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">🔴 LIVE · Auto-refresh 60s</div>
    <h1>Faridabad Area Bhati March 2026 — Sewadar Dashboard</h1>
  </div>
  <div style="text-align:right">
    <div class="last-updated" id="lastUpdated">Connecting...</div>
    <div id="istClock" style="font-size:.72rem;color:var(--muted)"></div>
  </div>
</div>

<div class="war-room" id="warRoom">
  <span class="label">🎯 War Room</span>
  <span style="color:var(--muted);font-size:.78rem">Loading live data...</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">📊 Overview</div>
  <div class="tab" onclick="showTab('scanners')">📡 Scanners</div>
  <div class="tab" onclick="showTab('centre')">🏘️ Centre View</div>
  <div class="tab" onclick="showTab('dept')">🏢 Dept View</div>
  <div class="tab" onclick="showTab('alerts')">⚠️ Alerts <span class="tbadge" id="alertBadge">0</span></div>
  <div class="tab" onclick="showTab('absent')">❌ Absentees</div>
  <div class="tab" onclick="showTab('attendance')">📋 Attendance</div>
  <div class="tab" onclick="showTab('print')">🖨️ Print Register</div>
</div>

<div class="page active" id="page-overview"><div id="overviewContent"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
<div class="page" id="page-scanners"><div id="scannersContent"><div class="loading"><div class="spinner"></div></div></div></div>
<div class="page" id="page-centre"><div id="centreContent"><div class="loading"><div class="spinner"></div></div></div></div>
<div class="page" id="page-dept"><div id="deptContent"><div class="loading"><div class="spinner"></div></div></div></div>
<div class="page" id="page-alerts"><div id="alertsContent"><div class="loading"><div class="spinner"></div></div></div></div>
<div class="page" id="page-absent">
  <div class="filters">
    <select id="absentDateFilter" onchange="renderAbsent()"><option value="">All Dates</option></select>
    <select id="absentCentreFilter" onchange="renderAbsent()"><option value="">All Centres</option></select>
    <select id="absentDeptFilter" onchange="renderAbsent()"><option value="">All Depts</option></select>
    <input class="search-box" id="absentSearch" placeholder="🔍 Name / badge..." oninput="renderAbsent()"/>
    <button class="btn btn-green" onclick="downloadCSV()">⬇️ Download CSV</button>
  </div>
  <div id="absentContent"><div class="loading"><div class="spinner"></div></div></div>
</div>
<div class="page" id="page-attendance">
  <div class="filters">
    <select id="attDateFilter" onchange="renderAttendance()"><option value="">All Dates</option></select>
    <input class="search-box" id="attSearch" placeholder="🔍 Name / badge / dept..." oninput="renderAttendance()"/>
  </div>
  <div id="attendanceContent"></div>
</div>
<div class="page" id="page-print">
  <div class="filters no-print">
    <select id="printDateFilter" onchange="renderPrint()"><option value="">All Dates</option></select>
    <select id="printCentreFilter" onchange="renderPrint()"><option value="">All Centres</option></select>
    <select id="printDeptFilter" onchange="renderPrint()"><option value="">All Depts</option></select>
    <button class="btn btn-accent" onclick="window.print()">🖨️ Print Page</button>
  </div>
  <div id="printContent"></div>
</div>

<script>
const SERVER='https://bhati-server-production.up.railway.app/';
let DATA=null,charts={};

function toIST(ts){
  if(!ts||ts==='-')return'-';
  try{const d=new Date(ts.includes('T')?ts:ts.replace(' ','T'));if(isNaN(d))return ts;
  const i=new Date(d.getTime()+19800000);return fmt12(i.getUTCHours(),i.getUTCMinutes());}
  catch(e){return ts;}
}
function toIST_full(ts){
  if(!ts||ts==='-')return'-';
  try{const d=new Date(ts.includes('T')?ts:ts.replace(' ','T'));if(isNaN(d))return ts;
  const i=new Date(d.getTime()+19800000);
  return pad(i.getUTCDate())+'-'+pad(i.getUTCMonth()+1)+'-'+i.getUTCFullYear()+' '+fmt12(i.getUTCHours(),i.getUTCMinutes());}
  catch(e){return ts;}
}
function rawToIST(t){
  if(!t||t==='-')return'-';
  const[h,m]=t.split(':').map(Number);
  const tot=h*60+m+330;
  return fmt12(Math.floor(tot/60)%24,tot%60);
}
function fmt12(h,m){const ap=h>=12?'PM':'AM';return pad(h%12||12)+':'+pad(m)+' '+ap;}
function pad(n){return String(n).padStart(2,'0');}
function nowIST(){const i=new Date(Date.now()+19800000);return fmt12(i.getUTCHours(),i.getUTCMinutes());}
setInterval(()=>{const e=document.getElementById('istClock');if(e)e.textContent='IST: '+nowIST();},1000);

const TABS=['overview','scanners','centre','dept','alerts','absent','attendance','print'];
function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',TABS[i]===name));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(DATA)renderPage(name);
}

async function fetchData(){
  try{
    const r=await fetch(SERVER+'?t='+Date.now());
    DATA=await r.json();
    document.getElementById('lastUpdated').textContent='Updated: '+(DATA.last_updated||'—');
    renderAll();
  }catch(e){document.getElementById('lastUpdated').textContent='⚠️ Fetch error — retrying...';}
}
function renderAll(){renderWarRoom();populateFilters();const a=TABS.find(id=>document.getElementById('page-'+id).classList.contains('active'))||'overview';renderPage(a);}
function renderPage(n){
  if(!DATA)return;
  if(n==='overview')renderOverview();
  else if(n==='scanners')renderScanners();
  else if(n==='centre')renderCentre();
  else if(n==='dept')renderDept();
  else if(n==='alerts')renderAlerts();
  else if(n==='absent')renderAbsent();
  else if(n==='attendance')renderAttendance();
  else if(n==='print')renderPrint();
}

function analyzeScans(){
  if(!DATA||!DATA.scans)return{reentryFlags:[],dupInFlags:[],dupOutFlags:[],missingOut:[],unknownScans:[],hourly:{},scanners:[]};
  const scans=DATA.scans;
  const byBadge={};
  scans.forEach(s=>{(byBadge[s.badge_no]=byBadge[s.badge_no]||[]).push(s);});
  Object.values(byBadge).forEach(a=>a.sort((x,y)=>new Date(x.timestamp)-new Date(y.timestamp)));
  const reentryFlags=[],dupInFlags=[],dupOutFlags=[],missingOut=[];
  Object.entries(byBadge).forEach(([badge,arr])=>{
    let ci=0,co=0;
    arr.forEach(s=>{if(s.type==='IN'){ci++;co=0;if(ci>1)dupInFlags.push(s);}else{co++;ci=0;if(co>1)dupOutFlags.push(s);}});
    for(let i=2;i<arr.length;i++){if(arr[i-2].type==='IN'&&arr[i-1].type==='OUT'&&arr[i].type==='IN')reentryFlags.push({...arr[i],first_in:arr[i-2].timestamp,out_at:arr[i-1].timestamp});}
    if(arr[arr.length-1].type==='IN')missingOut.push(arr[arr.length-1]);
  });
  const unknownScans=scans.filter(s=>!s.sewadar_name||s.sewadar_name==='Unknown'||!s.department);
  const hourly={};
  scans.forEach(s=>{const i=new Date(new Date(s.timestamp).getTime()+19800000);const h=i.getUTCHours();hourly[h]=(hourly[h]||0)+1;});
  const scannerMap={};
  scans.forEach(s=>{const k=s.scanned_by_badge;if(!k)return;if(!scannerMap[k])scannerMap[k]={badge:k,name:s.scanned_by_name,centre:s.scanned_by_centre,times:[],count:0};scannerMap[k].times.push(new Date(s.timestamp));scannerMap[k].count++;});
  const scanners=Object.values(scannerMap).map(sc=>{
    sc.times.sort((a,b)=>a-b);sc.last_scan=sc.times[sc.times.length-1];
    if(sc.times.length>1){const d=[];for(let i=1;i<sc.times.length;i++)d.push((sc.times[i]-sc.times[i-1])/1000);sc.avg_gap=Math.round(d.reduce((a,b)=>a+b,0)/d.length);}else sc.avg_gap=null;
    sc.minutes_ago=Math.round((Date.now()-sc.last_scan)/60000);sc.is_active=sc.minutes_ago<15;return sc;
  }).sort((a,b)=>b.count-a.count);
  return{byBadge,reentryFlags,dupInFlags,dupOutFlags,missingOut,unknownScans,hourly,scanners};
}

function renderWarRoom(){
  const an=analyzeScans();
  const tot=an.reentryFlags.length+an.dupInFlags.length+an.dupOutFlags.length+an.unknownScans.length;
  document.getElementById('alertBadge').textContent=tot;
  const ac=an.scanners.filter(s=>s.is_active).length;
  const last=DATA.last_scan_at?toIST_full(DATA.last_scan_at):'—';
  document.getElementById('warRoom').innerHTML=`
    <span class="label">🎯 War Room</span>
    <div class="wr-pill green"><div class="pulse"></div>${DATA.total_sewadars||0} Present</div>
    <div class="wr-pill blue">📊 ${DATA.total_scans||0} Scans</div>
    <div class="wr-pill orange">⏳ ${an.missingOut.length} Missing OUT</div>
    <div class="wr-pill yellow">👤 ${an.unknownScans.length} Unknown</div>
    <div class="wr-pill ${an.reentryFlags.length>0?'red':'green'}">🔄 ${an.reentryFlags.length} Re-entries</div>
    <div class="wr-pill ${an.dupInFlags.length+an.dupOutFlags.length>0?'red':'green'}">⚠️ ${an.dupInFlags.length+an.dupOutFlags.length} Dup Scans</div>
    <div class="wr-pill blue">📡 ${ac} Active Scanners</div>
    <div class="wr-pill blue" style="margin-left:auto">🕐 Last: ${last} IST</div>`;
}

function renderOverview(){
  const an=analyzeScans();
  const ld=(DATA.dates||[]).slice(-1)[0]||'';
  const reg=DATA.total_registered||0,pres=DATA.total_sewadars||0;
  const pct=reg?Math.round(pres/reg*100):0,apct=reg?Math.round((reg-pres)/reg*100):0;
  const hl=Array.from({length:24},(_,i)=>fmt12(i,0));
  const hd=Array.from({length:24},(_,i)=>an.hourly[i]||0);
  document.getElementById('overviewContent').innerHTML=`
    <div class="grid4" style="margin-bottom:14px">
      <div class="card kpi green"><div class="val">${pres}</div><div class="lbl">Present (IN)</div><div class="sub">${pct}% of registered</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:var(--success)"></div></div></div>
      <div class="card kpi red"><div class="val">${reg-pres}</div><div class="lbl">Absent</div><div class="sub">${apct}% of registered</div><div class="prog-bar"><div class="prog-fill" style="width:${apct}%;background:var(--danger)"></div></div></div>
      <div class="card kpi orange"><div class="val">${an.missingOut.length}</div><div class="lbl">Missing OUT</div><div class="sub">IN but no OUT yet</div></div>
      <div class="card kpi blue"><div class="val">${reg}</div><div class="lbl">Total Registered</div><div class="sub">From Excel master</div></div>
    </div>
    <div class="grid4" style="margin-bottom:14px">
      <div class="card kpi yellow"><div class="val">${an.unknownScans.length}</div><div class="lbl">Unknown Badges</div></div>
      <div class="card kpi orange"><div class="val">${an.reentryFlags.length}</div><div class="lbl">Re-entries</div></div>
      <div class="card kpi red"><div class="val">${an.dupInFlags.length}</div><div class="lbl">Dup IN Scans</div></div>
      <div class="card kpi red"><div class="val">${an.dupOutFlags.length}</div><div class="lbl">Dup OUT Scans</div></div>
    </div>
    <div class="grid2" style="margin-bottom:14px">
      <div class="card"><div class="card-title"><div class="dot" style="background:var(--accent)"></div>Hourly Scan Rate (IST)</div><div class="chart-box"><canvas id="hourlyChart"></canvas></div></div>
      <div class="card"><div class="card-title"><div class="dot" style="background:var(--success)"></div>Daily Headcount</div><div class="chart-box"><canvas id="dailyChart"></canvas></div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-title"><div class="dot" style="background:var(--warn)"></div>Recent Scans</div>
        <div class="tbl-wrap"><table><thead><tr><th>Time (IST)</th><th>Name</th><th>Badge</th><th>Dept</th><th>Type</th><th>Scanner</th></tr></thead><tbody>
          ${[...DATA.scans].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,25).map(s=>`
          <tr class="${(!s.sewadar_name||s.sewadar_name==='Unknown')?'warn-row':''}">
            <td>${toIST(s.timestamp)}</td>
            <td>${(!s.sewadar_name||s.sewadar_name==='Unknown')?'<span class="btag unknown">UNKN</span> ':''}<b>${s.sewadar_name||'—'}</b></td>
            <td style="font-size:.7rem;color:var(--muted)">${s.badge_no}</td>
            <td style="font-size:.7rem">${s.department||'—'}</td>
            <td><span class="btag ${s.type.toLowerCase()}">${s.type}</span></td>
            <td style="font-size:.7rem;color:var(--muted)">${s.scanned_by_name||'—'}</td>
          </tr>`).join('')}
        </tbody></table></div>
      </div>
      <div class="card"><div class="card-title"><div class="dot" style="background:var(--success)"></div>Centre Summary</div>
        <div class="tbl-wrap"><table><thead><tr><th>Centre</th><th>Expected</th><th>Present</th><th>%</th><th>No OUT</th></tr></thead><tbody>
          ${(DATA.centre_summary||[]).map(c=>{const dd=c.dates?.[ld]||{present:0};const p2=c.expected?Math.round((dd.present||0)/c.expected*100):0;const mo=an.missingOut.filter(s=>s.sewadar_centre===c.centre).length;
          return`<tr><td><b>${c.centre}</b></td><td>${c.expected||'—'}</td><td style="color:var(--success);font-weight:700">${dd.present||0}</td>

  Object.entries(bg).sort().forEach(([dept,arr])=>{
    html+=`<div class="card" style="margin-bottom:12px">
      <div class="card-title no-print"><div class="dot" style="background:var(--accent)"></div>🏢 ${dept} (${arr.length})</div>
      <div class="dept-group-header print-show" style="margin-bottom:6px">${dept} — ${arr.length} sewadars</div>
      <table><thead><tr><th>#</th><th>Badge No</th><th>Name</th><th>Centre</th><th>G</th>
      ${dates.map(d=>`<th>${d}<br><span style="font-weight:400">IN / OUT</span></th>`).join('')}</tr></thead>
      <tbody>${arr.map((sw,i)=>`<tr><td>${i+1}</td><td style="font-size:.7rem">${sw.badge_no}</td><td><b>${sw.sewadar_name}</b></td>
        <td style="font-size:.7rem">${sw.sewadar_centre||'—'}</td><td>${sw.gender||'—'}</td>
        ${dates.map(d=>{const dd=sw[d]||{};const it=rawToIST(dd.first_in);const ot=rawToIST(dd.last_out);
          return`<td style="text-align:center">${dd.status==='PRESENT'
            ?`<span class="btag present no-print">✓</span><span class="print-show" style="font-size:.65rem">${it}<br>${ot}</span>`
            :`<span class="btag absent no-print">✗</span><span class="check-box-print print-show"></span>`}</td>`;}).join('')}
      </tr>`).join('')}</tbody></table></div>`;
  });
  document.getElementById('printContent').innerHTML=html;
}

fetchData();
setInterval(fetchData,60000);
</script>
